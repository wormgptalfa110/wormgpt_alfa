                if (initData && initData.user && initData.user.language_code) {
                    const userLang = initData.user.language_code.split('-')[0];
                    if (L10N[userLang]) savedLang = userLang;
                }
            } catch (_) {}
        }

        applyLanguage(savedLang);

        // if URL has ?lang=...
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang && L10N[urlLang]) {
            applyLanguage(urlLang);
        }

        console.log('🔥 +wormgpt Alfa loaded successfully');
    })();
</script>
