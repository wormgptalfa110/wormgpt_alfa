<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>+wormgpt Alfa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #e8e8e8;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 540px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 32px;
            padding: 24px 20px 28px;
            border: 1px solid #1a1a1a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 800px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .logo .highlight { color: #ff2d2d; }
        .status {
            font-size: 10px;
            font-weight: 600;
            background: #111;
            color: #555;
            padding: 4px 12px;
            border-radius: 100px;
            border: 1px solid #1e1e1e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status .dot {
            width: 6px;
            height: 6px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse { 50% { opacity: .4; transform: scale(.8); } }

        .model-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            flex-shrink: 0;
            justify-content: center;
        }
        .model-chip {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }
        .model-chip:hover {
            background: #181818;
            border-color: #ff2d2d;
            color: #fff;
        }
        .model-chip.active {
            background: #1a0808;
            border-color: #ff2d2d;
            color: #ff2d2d;
        }

        .security-banner {
            background: #0d0d0d;
            border: 1px solid #181818;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .security-banner .shield { font-size: 16px; flex-shrink: 0; }
        .security-banner .text {
            font-size: 11px;
            color: #777;
            line-height: 1.4;
        }
        .security-banner .text strong { color: #ff3b3b; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
            padding-right: 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: #0a0a0a; }
        .chat-messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 10px; }

        .msg {
            max-width: 90%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user {
            align-self: flex-end;
            background: #1a0808;
            border: 1px solid #2a0a0a;
            color: #ff6b6b;
        }
        .msg.bot {
            align-self: flex-start;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            color: #e0e0e0;
        }
        .msg.bot .model-name {
            font-size: 9px;
            color: #ff2d2d;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }
        .msg .typing {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #555;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .msg .typing:nth-child(2) { animation-delay: 0.2s; }
        .msg .typing:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        .chat-input {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            padding: 4px 4px 4px 16px;
            transition: border-color .25s;
        }
        .chat-input:focus-within {
            border-color: #ff2d2d;
            box-shadow: 0 0 30px rgba(255,45,45,.03);
        }
        .chat-input input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 12px 0;
            min-width: 0;
        }
        .chat-input input::placeholder { color: #3a3a3a; }
        .chat-input .send-btn {
            background: #ff2d2d;
            border: none;
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            transition: background .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .chat-input .send-btn:hover { background: #ff4444; }
        .chat-input .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 8px 16px;
            color: #888;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            flex-shrink: 0;
            margin-top: 8px;
        }
        .clear-btn:hover {
            background: #2a0a0a;
            border-color: #ff2d2d;
            color: #ff2d2d;
        }

        .footer {
            margin-top: 10px;
            text-align: center;
            font-size: 9px;
            font-weight: 500;
            color: #222;
            letter-spacing: .5px;
            flex-shrink: 0;
        }
        .footer .accent { color: #ff2d2d; }

        .error-box {
            background: #1a0000;
            border: 1px solid #ff2d2d;
            border-radius: 12px;
            padding: 12px 16px;
            color: #ff6666;
            font-size: 13px;
            text-align: center;
            margin-bottom: 12px;
        }

        @media (max-width: 460px) {
            .container { padding: 16px 14px 20px; border-radius: 24px; }
            .logo { font-size: 17px; }
            .model-chip { font-size: 9px; padding: 4px 12px; }
            .msg { font-size: 13px; padding: 8px 12px; }
            .chat-input input { font-size: 13px; padding: 10px 0; }
            .chat-input .send-btn { width: 40px; height: 40px; font-size: 14px; border-radius: 12px; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo">+wormgpt <span class="highlight">Alfa</span></div>
        <div class="status"><span class="dot"></span> <span id="statusText">online</span></div>
    </div>

    <div class="model-bar" id="modelBar">
        <button class="model-chip active" data-model="wormgpt-2.5">wormgpt 2.5</button>
        <button class="model-chip" data-model="wormgpt-3">wormgpt 3</button>
        <button class="model-chip" data-model="wormgpt-4pro">wormgpt 4pro</button>
    </div>

    <div class="security-banner">
        <span class="shield">🛡️</span>
        <span class="text" id="securityText">
            <strong>This page is protected by our team's strongest security protocols.</strong>
            All messages will be deleted upon exit.
        </span>
    </div>

    <!-- نمایش پیام خطا در صورت عدم وجود WebApp -->
    <div id="webappError" class="error-box" style="display:none;">
        ⚠️ Please open this app from the Telegram bot.
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off" />
        <button class="send-btn" id="sendBtn">➤</button>
    </div>

    <button class="clear-btn" id="clearBtn">🗑️ Clear Chat History</button>

    <div class="footer">
        <span class="accent">⚡</span> powered by <span class="accent">+wormgpt Alfa</span> <span class="accent">⚡</span>
    </div>

</div>

<script>
    (function() {
        'use strict';

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const modelChips = document.querySelectorAll('.model-chip');
        const securityText = document.getElementById('securityText');
        const statusText = document.getElementById('statusText');
        const errorBox = document.getElementById('webappError');

        let currentModel = 'wormgpt-2.5';
        let isWaiting = false;
        let lang = 'en';
        let isWebAppReady = false;

        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang) lang = urlLang;

        // ====== ترجمه‌های امنیتی ======
        const securityL10N = {
            'en': '<strong>This page is protected by our team\'s strongest security protocols.</strong> All messages will be deleted upon exit.',
            'ar': '<strong>هذه الصفحة محمية بأقوى بروتوكولات الأمان لفريقنا.</strong> سيتم حذف جميع الرسائل عند الخروج.',
            'fa': '<strong>این صفحه با قوی‌ترین پروتکل‌های امنیتی تیم ما محافظت می‌شود.</strong> پس از خروج، تمامی پیام‌ها پاک می‌شوند.',
            'az': '<strong>Bu səhifə komandamızın ən güclü təhlükəsizlik protokolları ilə qorunur.</strong> Çıxış zamanı bütün mesajlar silinəcək.',
            'hi': '<strong>इस पेज को हमारी टीम के सबसे मजबूत सुरक्षा प्रोटोकॉल द्वारा संरक्षित किया जाता है.</strong> बाहर निकलने पर सभी संदेश हटा दिए जाएंगे।',
            'de': '<strong>Diese Seite wird durch die stärksten Sicherheitsprotokolle unseres Teams geschützt.</strong> Alle Nachrichten werden beim Verlassen gelöscht.',
            'fr': '<strong>Cette page est protégée par les protocoles de sécurité les plus puissants de notre équipe.</strong> Tous les messages seront supprimés à la sortie.'
        };
        if (securityL10N[lang]) {
            securityText.innerHTML = securityL10N[lang];
        }

        // ====== انتخاب مدل ======
        modelChips.forEach(chip => {
            chip.addEventListener('click', function() {
                modelChips.forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentModel = this.dataset.model;
                if (isWebAppReady && window.Telegram && Telegram.WebApp) {
                    Telegram.WebApp.sendData(JSON.stringify({
                        action: 'select_model',
                        model: currentModel
                    }));
                }
                console.log('🧠 Model changed to:', currentModel);
            });
        });

        // ====== توابع چت ======
        function addMessage(text, isUser, modelName = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isUser ? 'user' : 'bot'}`;

            if (!isUser && modelName) {
                const nameSpan = document.createElement('span');
                nameSpan.className = 'model-name';
                nameSpan.textContent = `🕸️ ${modelName}`;
                msgDiv.appendChild(nameSpan);
            }

            if (text) {
                const textSpan = document.createElement('span');
                textSpan.textContent = text;
                msgDiv.appendChild(textSpan);
            } else {
                for (let i = 0; i < 3; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'typing';
                    msgDiv.appendChild(dot);
                }
            }

            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        function removeTyping() {
            const typingMsgs = chatMessages.querySelectorAll('.msg.bot:last-child');
            const lastMsg = typingMsgs[typingMsgs.length - 1];
            if (lastMsg && lastMsg.querySelector('.typing')) {
                lastMsg.remove();
                return true;
            }
            return false;
        }

        function clearChat() {
            chatMessages.innerHTML = '';
            if (isWebAppReady && window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.sendData(JSON.stringify({
                    action: 'clear_history'
                }));
            }
            addMessage('🗑️ Chat history cleared.', false, 'system');
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isWaiting) return;

            if (!isWebAppReady) {
                addMessage('❌ WebApp not ready. Please open from Telegram.', false, currentModel);
                return;
            }

            addMessage(text, true);
            userInput.value = '';
            userInput.focus();

            addMessage('', false);
            isWaiting = true;
            sendBtn.disabled = true;

            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.sendData(JSON.stringify({
                    action: 'message',
                    text: text,
                    model: currentModel,
                    lang: lang
                }));
            }
        }

        function receiveMessageFromBot(text, modelName) {
            removeTyping();
            addMessage(text, false, modelName || currentModel);
            isWaiting = false;
            sendBtn.disabled = false;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ====== راه‌اندازی Telegram WebApp ======
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            isWebAppReady = true;
            statusText.textContent = 'connected';
            errorBox.style.display = 'none';

            Telegram.WebApp.onEvent('message', function(data) {
                try {
                    const payload = typeof data === 'string' ? JSON.parse(data) : data;
                    if (payload.action === 'bot_reply') {
                        receiveMessageFromBot(payload.text, payload.model);
                    }
                } catch (e) {
                    console.error('Error parsing message from bot:', e);
                }
            });

            Telegram.WebApp.sendData(JSON.stringify({
                action: 'webapp_ready',
                lang: lang
            }));

        } else {
            // حالت آفلاین - نمایش خطا
            isWebAppReady = false;
            statusText.textContent = 'offline';
            errorBox.style.display = 'block';
            errorBox.textContent = '⚠️ Please open this app from the Telegram bot.';
            addMessage('⚠️ Please open this app from the Telegram bot.', false, 'system');
        }

        // ====== رویدادها ======
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        clearBtn.addEventListener('click', clearChat);

        window.receiveMessageFromBot = receiveMessageFromBot;

        console.log('🔥 +wormgpt Alfa loaded');
        console.log('📡 WebApp ready:', isWebAppReady);
        console.log('🌐 Language:', lang);

    })();
</script>
</body>
</html>
